<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMAIS Clínica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#13151f;--bg4:#22263a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b8fa8;--text3:#555873;
  --gold:#c9a84c;--gold2:#e2c070;--gold-bg:rgba(201,168,76,0.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);--green-bg2:rgba(34,197,94,0.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --active-bg:#1e3a2f;--active:#4ade80;
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --shadow:0 4px 32px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px;}
a{color:inherit;text-decoration:none;}button{cursor:pointer;border:none;outline:none;font-family:inherit;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center;}
.login-brand{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:-.02em;margin:16px 0 4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.login-err{background:var(--red-bg);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius-xs);color:var(--red);font-size:13px;padding:10px 14px;margin-bottom:14px;text-align:left;display:none;}
#app{display:flex;min-height:100vh;display:none;}
.sidebar{width:240px;min-height:100vh;background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s;}
.sb-header{padding:22px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.sb-logo{width:40px;height:40px;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.2px;}
.sb-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--radius-sm);color:var(--text2);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg4);color:var(--text);}
.nav-item.active{background:var(--active-bg);color:var(--active);}
.nav-ico{font-size:17px;width:21px;text-align:center;flex-shrink:0;}
.sb-footer{padding:14px 10px;border-top:1px solid var(--border);}
.btn-sair{display:flex;align-items:center;gap:11px;width:100%;padding:10px 13px;border-radius:var(--radius-sm);background:transparent;color:var(--red);font-size:13.5px;font-weight:500;transition:background .15s;}
.btn-sair:hover{background:var(--red-bg);}
.main{margin-left:240px;flex:1;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 30px 0;gap:12px;flex-wrap:wrap;}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.03em;}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.page-body{padding:22px 30px 48px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.stat-icon{font-size:21px;margin-bottom:10px;}
.stat-val{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.04em;}
.stat-label{font-size:11px;color:var(--text2);margin-top:5px;font-weight:500;}
.alert-banner{background:#2d2200;border:1px solid var(--amber);border-radius:var(--radius-sm);padding:13px 18px;color:var(--amber);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.upcoming-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);margin-bottom:8px;}
.upcoming-bar{width:4px;height:38px;border-radius:2px;flex-shrink:0;}
.upcoming-bar.y{background:var(--amber);}.upcoming-bar.r{background:var(--red);}
.upcoming-info{flex:1;}
.upcoming-name{font-size:13.5px;font-weight:500;}
.upcoming-date{font-size:11.5px;color:var(--text2);margin-top:2px;}
.upcoming-val{font-size:13.5px;font-weight:700;color:var(--gold);margin-right:8px;}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px solid var(--border);}
.sum-row:last-child{border-bottom:none;}
.sum-lbl{font-size:12.5px;color:var(--text2);}
.sum-val{font-size:17px;font-weight:700;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.month-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:var(--radius-xs);font-size:15px;transition:background .15s;}
.month-btn:hover{background:var(--bg4);}
.month-lbl{font-size:15px;font-weight:600;min-width:150px;text-align:center;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:40px;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:background .15s,transform .12s;cursor:pointer;border:none;font-family:inherit;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-gold{background:var(--gold);color:#0f1117;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-ghost:hover{background:var(--bg4);}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.22);height:33px;padding:0 12px;font-size:12px;}
.btn-green:hover{background:var(--green-bg2);}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.22);height:33px;padding:0 12px;font-size:12px;}
.btn-red:hover{background:rgba(239,68,68,.2);}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.22);height:33px;padding:0 12px;font-size:12px;}
.btn-amber:hover{background:rgba(245,158,11,.2);}
.btn-sm{height:33px;padding:0 12px;font-size:12px;}
.act-group{display:flex;gap:5px;}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;font-weight:600;padding:13px 15px;text-align:left;white-space:nowrap;}
td{padding:12px 15px;font-size:13.5px;color:var(--text);border-top:1px solid var(--border);white-space:nowrap;}
tr:hover td{background:var(--bg4);}
.tr-venc td{background:rgba(239,68,68,.05);}.tr-venc:hover td{background:rgba(239,68,68,.09);}
.tr-pago td{color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.22);}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.22);}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.22);}
.b-gray{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border);}
.b-gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(201,168,76,.22);}
.form-group{margin-bottom:16px;}
label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xs);padding:10px 13px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
input::placeholder{color:var(--text3);}select option{background:var(--bg3);}
textarea{resize:vertical;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;animation:fadeIn .15s;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:slideUp .2s ease;}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h3{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text2);font-size:21px;cursor:pointer;padding:2px 6px;border-radius:6px;}
.modal-close:hover{background:var(--bg4);color:var(--text);}
.modal-body{padding:22px 24px;}
.tabs{display:flex;gap:3px;background:var(--bg3);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border);width:fit-content;margin-bottom:18px;}
.tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;transition:background .15s,color .15s;border:none;font-family:inherit;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:600;}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:28px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.upload-zone:hover{border-color:var(--gold);background:var(--gold-bg);}
.upload-zone p{color:var(--text2);font-size:13px;margin-top:6px;}
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:14px;}
.doc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:border-color .15s,transform .15s;}
.doc-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.doc-icon{font-size:30px;}
.doc-name{font-size:12.5px;font-weight:500;word-break:break-word;}
.doc-acts{display:flex;gap:6px;margin-top:2px;}
.loc-field{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 18px;margin-bottom:18px;flex-wrap:wrap;}
.loc-lbl{font-size:13.5px;font-weight:500;color:var(--text2);flex:1;}
.loc-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xs);color:var(--gold);font-size:14px;font-weight:700;padding:7px 12px;width:150px;text-align:right;font-family:inherit;outline:none;}
.loc-inp:focus{border-color:var(--gold);}
.resumo{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:22px;}
.res-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;}
.res-row:last-child{border-bottom:none;}
.res-row.tot{font-weight:700;font-size:15.5px;}
.res-lbl{color:var(--text2);}
.empty{text-align:center;padding:56px 20px;color:var(--text2);}
.empty-ico{font-size:44px;margin-bottom:14px;}
.empty-txt{font-size:14px;}
#toast{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px 17px;font-size:13.5px;font-weight:500;min-width:240px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;animation:slideIn .22s ease;}
.toast-item.ok{border-left:3px solid var(--green);}.toast-item.err{border-left:3px solid var(--red);}.toast-item.inf{border-left:3px solid var(--gold);}
#loader{position:fixed;inset:0;background:rgba(15,17,23,.65);display:none;align-items:center;justify-content:center;z-index:300;}
#loader.on{display:flex;}
.spinner{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;}
.cpv-item{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;}
.cpv-ico{font-size:22px;}.cpv-info{flex:1;}
.cpv-name{font-size:13.5px;font-weight:500;}
.cpv-meta{font-size:11.5px;color:var(--text2);margin-top:2px;}
.ham{display:none;background:transparent;color:var(--text);font-size:21px;padding:6px;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .ham{display:flex;}.sb-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .25s;}
  .sb-overlay.on{opacity:1;pointer-events:all;}.sidebar{transform:translateX(-100%);}.sidebar.on{transform:translateX(0);}
  .main{margin-left:0;}.topbar{padding:16px 16px 0;}.page-body{padding:16px 16px 40px;}
  .grid-4{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}.loc-inp{width:100%;}
}
@media(max-width:480px){.grid-4{grid-template-columns:1fr;}.stat-val{font-size:22px;}}
</style>
</head>

<script>
'use strict';
// ── CONFIG ──
const SUPA_URL='https://pvdkjditnogatdontnns.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2ZGtqZGl0bm9nYXRkb250bm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjM2NjAsImV4cCI6MjA5MjUzOTY2MH0.wLtEiTw5PC_DdmUpcd_uqlwq0ea2rPrNRR3VKM2Rlfg';
const SIGNED_EXPIRY=3600;
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);
let CU=null;

// ── AUTH ──
async function doLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const senha=document.getElementById('inp-senha').value;
  const errEl=document.getElementById('login-err');
  errEl.style.display='none';
  if(!email||!senha){errEl.textContent='Preencha e-mail e senha.';errEl.style.display='block';return;}
  document.getElementById('btn-login').disabled=true;L(1);
  const{error}=await sb.auth.signInWithPassword({email,password:senha});
  L(0);document.getElementById('btn-login').disabled=false;

function L(on){document.getElementById('loader').className=on?'on':'';}
function toast(msg,type='inf',ms=3000){
  const ic={ok:'✅',err:'❌',inf:'ℹ️'};

function fmtBRL(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtD(iso){if(!iso)return'—';const[y,m,d]=iso.substring(0,10).split('-');return`${d}/${m}/${y}`;}
const MESES=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function nomeMes(m,a){return`${MESES[m]} ${a}`;}
function openModal(title,html,maxw){

function confirmDlg(msg,title){

    const b=document.createElement('div');

    b.innerHTML=`<div class="modal" style="max-width:380px"><div class="modal-hdr"><h3>${title||'Confirmar'}</h3></div><div class="modal-body"><p style="color:var(--text2);font-size:13.5px;margin-bottom:20px">${msg}</p><div class="form-actions"><button class="btn btn-ghost btn-sm" id="cn">Cancelar</button><button class="btn btn-red btn-sm" id="cy">Confirmar</button></div></div></div>`;

let FMes=new Date().getMonth()+1,FAno=new Date().getFullYear(),FLancs=[],FLoc=0;
async function renderFinanceiro(){
  document.getElementById('topbar-actions').innerHTML=`
    <div class="month-nav">
      <button class="month-btn" id="f-ant">◀</button>

      <div class="sec-title" style="margin-bottom:14px">📊 Resumo do mês</div>
      <div class="res-row"><span class="res-lbl">TOTAL BRUTO - DESPESAS</span><span style="font-weight:700;color:var(--red)" id="r-bruto">—</span></div>
      <div class="res-row"><span class="res-lbl">(-) RECEITA - LOCAÇÃO</span><span style="font-weight:700;color:var(--green)" id="r-loc">—</span></div>
      <div class="res-row tot"><span class="res-lbl">TOTAL LÍQUIDO - DESPESAS</span><span id="r-liq">—</span></div>
      <div class="res-row"><span class="res-lbl">🧑‍⚕️ MAISA (50%)</span><span style="font-weight:700;color:var(--gold)" id="r-mai">—</span></div>
      <div class="res-row"><span class="res-lbl">🧑‍⚕️ KAMYLLA (50%)</span><span style="font-weight:700;color:var(--gold)" id="r-kam">—</span></div>
    </div>`;
  document.getElementById('f-ant').onclick=()=>{FMes--;if(FMes<1){FMes=12;FAno--;}fRecarregar();};
  document.getElementById('f-prox').onclick=()=>{FMes++;if(FMes>12){FMes=1;FAno++;}fRecarregar();};
  await fRecarregar();
}
async function fRecarregar(){
  const lbl=document.getElementById('f-mes-lbl');
  if(lbl)lbl.textContent=nomeMes(FMes,FAno);
  L(1);
  try{
    // Anti-duplicata: gera contas fixas só se não existirem para o mês
    await gerarContasFixas(FMes,FAno);
    const{data}=await sb.from('lancamentos').select('*').eq('user_id',CU.id).eq('mes',FMes).eq('ano',FAno).order('data_vencimento',{ascending:true,nullsFirst:false});
    FLancs=data||[];
    FLoc=await getLocacao(FMes,FAno);
    const li=document.getElementById('f-loc-inp');
    if(li)li.value=FLoc||'';
    fRenderTabela();fRenderResumo();
  }catch(e){toast('Erro: '+e.message,'err');}
  finally{L(0);}
}
async function gerarContasFixas(mes,ano){
  const{data:fixas}=await sb.from('contas_fixas').select('*').eq('user_id',CU.id).eq('ativa',true);
  if(!fixas||!fixas.length)return;
  const{data:exist}=await sb.from('lancamentos').select('conta_fixa_id').eq('user_id',CU.id).eq('mes',mes).eq('ano',ano).eq('tipo','conta_fixa');
  // IDs já existentes — anti-duplicata
  const ids=new Set((exist||[]).map(l=>l.conta_fixa_id));
  const novas=fixas.filter(f=>!ids.has(f.id));
  if(!novas.length)return;
  const inserts=novas.map(f=>{
    const diasMes=new Date(ano,mes,0).getDate();
    const diaR=Math.min(f.dia_vencimento,diasMes);
    return{user_id:CU.id,tipo:'conta_fixa',descricao:f.nome,valor:f.valor_padrao,
      data_vencimento:`${ano}-${String(mes).padStart(2,'0')}-${String(diaR).padStart(2,'0')}`,
      data_pagamento:null,status:'a_pagar',mes,ano,conta_fixa_id:f.id};
  });
  await sb.from('lancamentos').insert(inserts);
}
function fRenderTabela(){
  const tb=document.getElementById('f-tbody'),em=document.getElementById('f-empty'),tw=document.querySelector('.tbl-wrap');
  if(!tb)return;
  const hoje=new Date().toISOString().substring(0,10);
  if(!FLancs.length){tw.style.display='none';em.style.display='block';return;}
  tw.style.display='';em.style.display='none';
  const tipos={'conta_fixa':'🔁 Fixa','servico_semanal':'🧹 Semanal','despesa_avulsa':'📌 Avulsa'};
  tb.innerHTML=FLancs.map(l=>{
    const venc=l.status==='a_pagar'&&l.data_vencimento&&l.data_vencimento<hoje;
    const pago=l.status==='pago';
    const rc=venc?'tr-venc':pago?'tr-pago':'';
    const bc=pago?'b-green':venc?'b-red':'b-amber';
    const bt=pago?'✅ Pago':venc?'🔴 Vencida':'⏳ A pagar';
    return`<tr class="${rc}">
      <td>${fmtD(l.data_pagamento)}</td><td>${fmtD(l.data_vencimento)}</td>
      <td><span style="font-size:11px;color:var(--text2)">${tipos[l.tipo]||''}</span><br>${l.descricao}</td>
      <td style="font-weight:700;color:var(--gold)">${fmtBRL(l.valor)}</td>
      <td><span class="badge ${bc}">${bt}</span></td>
      <td><div class="act-group">
        ${l.status==='a_pagar'?`<button class="btn btn-green" onclick="fPago('${l.id}')">✅</button>`:''}
        <button class="btn btn-amber" onclick="fEditar('${l.id}')">✏️</button>
        <button class="btn btn-red" onclick="fDel('${l.id}')">🗑️</button>
      </div></td></tr>`;
  }).join('');
}
function fRenderResumo(){
  const bruto=FLancs.reduce((s,l)=>s+Number(l.valor),0);
  // Divisão 50/50 em centavos — maisa + kamylla = total exato
  const liq=bruto-FLoc;
  const liqC=Math.round(liq*100);
  const maiC=Math.floor(liqC/2);
  const kamC=liqC-maiC;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('r-bruto',fmtBRL(bruto));set('r-loc',fmtBRL(FLoc));set('r-liq',fmtBRL(liq));set('r-mai',fmtBRL(maiC/100));set('r-kam',fmtBRL(kamC/100));
}
async function fPago(id){
  L(1);await sb.from('lancamentos').update({status:'pago',data_pagamento:new Date().toISOString().substring(0,10)}).eq('id',id).eq('user_id',CU.id);L(0);
  toast('Marcado como pago! ✅','ok');fRecarregar();

function fEditar(id){const l=FLancs.find(x=>x.id===id);if(!l)return;_modalLanc(l.tipo,l);}
async function fSaveLocacao(){
  const v=parseFloat(document.getElementById('f-loc-inp').value)||0;
  L(1);try{await saveLocacao(FMes,FAno,v);FLoc=v;fRenderResumo();toast('Receita de locação salva!','ok');}
  catch(e){toast('Erro: '+e.message,'err');}finally{L(0);}
}
function modalLanc(tipo){_modalLanc(tipo,null);}
function _modalLanc(tipo,l){
  const titulos={servico_semanal:'Registrar serviço semanal',despesa_avulsa:'Nova despesa avulsa',conta_fixa:'Editar lançamento'};
  openModal(l?'Editar lançamento':titulos[tipo]||'Lançamento',`
    <div class="form-group"><label>Descrição *</label><input id="ml-desc" value="${l?l.descricao:''}" placeholder="Ex: Limpeza…"/></div>
    <div class="form-row">
      <div class="form-group"><label>Valor (R$) *</label><input id="ml-val" type="number" min="0" step="0.01" value="${l?l.valor:''}"/></div>
      <div class="form-group"><label>Status</label>
        <select id="ml-st"><option value="a_pagar" ${!l||l.status==='a_pagar'?'selected':''}>⏳ A pagar</option><option value="pago" ${l&&l.status==='pago'?'selected':''}>✅ Pago</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Data de vencimento</label><input id="ml-venc" type="date" value="${l&&l.data_vencimento?l.data_vencimento:''}"/></div>
      <div class="form-group"><label>Data de pagamento</label><input id="ml-pgto" type="date" value="${l&&l.data_pagamento?l.data_pagamento:''}"/></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold btn-sm" onclick="saveLanc('${l?l.id:''}','${tipo}')">Salvar</button>
    </div>`);
}
async function saveLanc(id,tipo){
  const desc=document.getElementById('ml-desc').value.trim();
  const val=parseFloat(document.getElementById('ml-val').value);
  const st=document.getElementById('ml-st').value;
  const venc=document.getElementById('ml-venc').value;
  const pgto=document.getElementById('ml-pgto').value;
  if(!desc||isNaN(val)){toast('Preencha descrição e valor.','err');return;}
  L(1);closeModal();
  const pay={user_id:CU.id,tipo,descricao:desc,valor:val,data_vencimento:venc||null,data_pagamento:pgto||null,status:st,mes:FMes,ano:FAno};
  const{error}=id?await sb.from('lancamentos').update(pay).eq('id',id):await sb.from('lancamentos').insert(pay);
  L(0);
  if(error){toast('Erro: '+error.message,'err');return;}
  toast(id?'Atualizado!':'Lançamento criado!','ok');fRecarregar();
}

// ── COMPROVANTES ──
let CMes=new Date().getMonth()+1,CAno=new Date().getFullYear();
async function renderComprovantes(){
  document.getElementById('topbar-actions').innerHTML=`
    <div class="month-nav">
      <button class="month-btn" id="c-ant">◀</button>
      <span class="month-lbl" id="c-mes-lbl"></span>
      <button class="month-btn" id="c-prox">▶</button>
    </div>
    <button class="btn btn-gold btn-sm" onclick="modalUploadCpv()">+ Anexar comprovante</button>`;
  document.getElementById('page-content').innerHTML=`
    <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Arquivos privados — links expiram em 60 minutos.</p>
    <div id="cpv-list"></div>
    <div id="cpv-empty" class="empty" style="display:none"><div class="empty-ico">📎</div><div class="empty-txt">Nenhum comprovante para este mês.</div></div>`;
  document.getElementById('c-ant').onclick=()=>{CMes--;if(CMes<1){CMes=12;CAno--;}cRecarregar();};
  document.getElementById('c-prox').onclick=()=>{CMes++;if(CMes>12){CMes=1;CAno++;}cRecarregar();};
  await cRecarregar();
}
async function cRecarregar(){
  const lbl=document.getElementById('c-mes-lbl');if(lbl)lbl.textContent=nomeMes(CMes,CAno);
  L(1);
  try{
    const{data:lMes}=await sb.from('lancamentos').select('id').eq('user_id',CU.id).eq('mes',CMes).eq('ano',CAno);
    const ids=(lMes||[]).map(l=>l.id);let cpvs=[];
    if(ids.length){const{data}=await sb.from('comprovantes').select('*,lancamentos(descricao)').in('lancamento_id',ids).order('created_at',{ascending:false});cpvs=data||[];}
    const list=document.getElementById('cpv-list'),empty=document.getElementById('cpv-empty');
    if(!cpvs.length){if(list)list.innerHTML='';if(empty)empty.style.display='block';return;}
    if(empty)empty.style.display='none';
    if(list)list.innerHTML=cpvs.map(c=>{
      const ext=c.arquivo_nome.split('.').pop().toUpperCase();
      const ico=ext==='PDF'?'📑':'🖼️';
      const dt=new Date(c.created_at).toLocaleDateString('pt-BR');
      return`<div class="cpv-item"><div class="cpv-ico">${ico}</div><div class="cpv-info"><div class="cpv-name">${c.arquivo_nome}</div><div class="cpv-meta">${c.lancamentos?.descricao||'—'} · ${dt}</div></div><div class="act-group"><button class="btn btn-green btn-sm" onclick="cVer('${c.arquivo_path}')">👁 Ver</button><button class="btn btn-red btn-sm" onclick="cDel('${c.id}','${c.arquivo_path}')">🗑️</button></div></div>`;
    }).join('');
  }catch(e){toast('Erro: '+e.message,'err');}finally{L(0);}
}
function modalUploadCpv(){
  openModal('Anexar comprovante',`
    <div class="form-group"><label>Lançamento</label><select id="cpv-lanc-sel"><option value="">Carregando…</option></select></div>
    <div class="form-group"><label>Arquivo (PDF ou imagem)</label>
      <div class="upload-zone" onclick="document.getElementById('cpv-file').click()">
        <div style="font-size:28px">📄</div><p>Clique ou arraste o arquivo aqui</p><p style="font-size:11px">PDF, JPG, PNG — máx. 10 MB</p>
      </div>
      <input type="file" id="cpv-file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="this.nextElementSibling.textContent=this.files[0]?'📄 '+this.files[0].name:''"/>
      <div style="font-size:12.5px;color:var(--text2);margin-top:8px"></div>
    </div>
    <div class="form-actions"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-gold btn-sm" onclick="cpvUpload()">Enviar</button></div>`);
  sb.from('lancamentos').select('id,descricao,data_vencimento').eq('user_id',CU.id).eq('mes',CMes).eq('ano',CAno).order('data_vencimento')
    .then(({data})=>{
      const sel=document.getElementById('cpv-lanc-sel');if(!sel)return;
      sel.innerHTML='<option value="">Selecione…</option>';
      (data||[]).forEach(l=>{const o=document.createElement('option');o.value=l.id;o.textContent=l.descricao+(l.data_vencimento?' — Venc. '+fmtD(l.data_vencimento):'');sel.appendChild(o);});
    });
}
async function cpvUpload(){
  const lancId=document.getElementById('cpv-lanc-sel')?.value;
  const file=document.getElementById('cpv-file')?.files[0];
  if(!lancId){toast('Selecione um lançamento.','err');return;}
  if(!file){toast('Selecione um arquivo.','err');return;}
  if(file.size>10*1024*1024){toast('Arquivo muito grande (máx. 10 MB).','err');return;}
  L(1);closeModal();
  try{
    const path=`${CU.id}/${lancId}/${Date.now()}_${file.name}`;
    const{error:eu}=await sb.storage.from('comprovantes').upload(path,file);if(eu)throw eu;
    const{error:ed}=await sb.from('comprovantes').insert({user_id:CU.id,lancamento_id:lancId,arquivo_path:path,arquivo_nome:file.name});if(ed)throw ed;
    toast('Comprovante enviado!','ok');cRecarregar();
  }catch(e){toast('Erro: '+e.message,'err');}finally{L(0);}
}
async function cVer(path){
  L(1);try{const u=await signedUrl('comprovantes',path);L(0);window.open(u,'_blank');}
  catch(e){L(0);toast('Erro: '+e.message,'err');}
}
async function cDel(id,path){
  if(!await confirmDlg('Excluir este comprovante?','Excluir'))return;
  L(1);await sb.storage.from('comprovantes').remove([path]);await sb.from('comprovantes').delete().eq('id',id);L(0);
  toast('Excluído.','ok');cRecarregar();
}

// ── DOCUMENTOS ──
let DTab='kamylla';
async function renderDocumentos(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-gold" onclick="modalUploadDoc()">+ Enviar documento</button>`;
  document.getElementById('page-content').innerHTML=`
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Documentos pessoais e profissionais. Links privados expiram em 60 min.</p>
    <div class="tabs">
      <button class="tab active" id="tab-kam" onclick="dSwitch('kamylla')">🧑‍⚕️ Kamylla</button>
      <button class="tab" id="tab-mai" onclick="dSwitch('maisa')">🧑‍⚕️ Maisa</button>
    </div>
    <div id="d-docs-grid" class="docs-grid"></div>
    <div id="d-docs-empty" class="empty" style="display:none"><div class="empty-ico">📁</div><div class="empty-txt" id="d-empty-txt">Nenhum documento.</div></div>`;
  await dLoad('kamylla');
}
function dSwitch(socia){
  DTab=socia;
  document.getElementById('tab-kam').classList.toggle('active',socia==='kamylla');
  document.getElementById('tab-mai').classList.toggle('active',socia==='maisa');
  dLoad(socia);
}
async function dLoad(socia){
  L(1);
  try{
    const{data}=await sb.from('documentos').select('*').eq('user_id',CU.id).eq('socia',socia).order('created_at',{ascending:false});
    const docs=data||[],grid=document.getElementById('d-docs-grid'),empty=document.getElementById('d-docs-empty'),emptyTxt=document.getElementById('d-empty-txt');
    if(!docs.length){if(grid)grid.innerHTML='';if(empty)empty.style.display='block';if(emptyTxt)emptyTxt.textContent=`Nenhum documento de ${socia==='kamylla'?'Kamylla':'Maisa'}.`;return;}
    if(empty)empty.style.display='none';
    if(grid)grid.innerHTML=docs.map(d=>{
      const ext=d.arquivo_path.split('.').pop().toUpperCase();
      const ico=ext==='PDF'?'📑':'🖼️';
      const dt=new Date(d.created_at).toLocaleDateString('pt-BR');
      return`<div class="doc-card"><div class="doc-icon">${ico}</div><div class="doc-name">${d.nome}</div><div style="font-size:11px;color:var(--text2)">${dt}</div><div class="doc-acts"><button class="btn btn-green btn-sm" onclick="dVer('${d.arquivo_path}')">👁 Ver</button><button class="btn btn-red btn-sm" onclick="dDel('${d.id}','${d.arquivo_path}')">🗑️</button></div></div>`;
    }).join('');
  }catch(e){toast('Erro: '+e.message,'err');}finally{L(0);}
}
function modalUploadDoc(){
  openModal('Enviar documento',`
    <div class="form-group"><label>Sócia *</label><select id="doc-socia"><option value="kamylla">Kamylla</option><option value="maisa">Maisa</option></select></div>
    <div class="form-group"><label>Nome do documento *</label><input id="doc-nome" placeholder="Ex: CRM, Diploma…"/></div>
    <div class="form-group"><label>Arquivo (PDF ou imagem)</label>
      <div class="upload-zone" onclick="document.getElementById('doc-file').click()">
        <div style="font-size:28px">📁</div><p>Clique ou arraste o arquivo aqui</p><p style="font-size:11px">PDF, JPG, PNG — máx. 20 MB</p>
      </div>
      <input type="file" id="doc-file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="this.nextElementSibling.textContent=this.files[0]?'📄 '+this.files[0].name:''"/>
      <div style="font-size:12.5px;color:var(--text2);margin-top:8px"></div>
    </div>
    <div class="form-actions"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-gold btn-sm" onclick="docUpload()">Enviar</button></div>`);
}
async function docUpload(){
  const socia=document.getElementById('doc-socia')?.value;
  const nome=document.getElementById('doc-nome')?.value.trim();
  const file=document.getElementById('doc-file')?.files[0];
  if(!nome){toast('Informe o nome.','err');return;}
  if(!file){toast('Selecione um arquivo.','err');return;}
  if(file.size>20*1024*1024){toast('Arquivo muito grande (máx. 20 MB).','err');return;}
  L(1);closeModal();
  try{
    const path=`${CU.id}/${socia}/${Date.now()}_${file.name}`;
    const{error:eu}=await sb.storage.from('documentos').upload(path,file);if(eu)throw eu;
    const{error:ed}=await sb.from('documentos').insert({user_id:CU.id,socia,nome,arquivo_path:path});if(ed)throw ed;
    toast('Documento enviado!','ok');dLoad(DTab);
  }catch(e){toast('Erro: '+e.message,'err');}finally{L(0);}
}
async function dVer(path){
  L(1);try{const u=await signedUrl('documentos',path);L(0);window.open(u,'_blank');}
  catch(e){L(0);toast('Erro: '+e.message,'err');}
}
async function dDel(id,path){
  if(!await confirmDlg('Excluir este documento?','Excluir'))return;
  L(1);await sb.storage.from('documentos').remove([path]);await sb.from('documentos').delete().eq('id',id);L(0);
  toast('Excluído.','ok');dLoad(DTab);
}
</script>
