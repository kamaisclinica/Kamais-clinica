<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMAIS Clínica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#13151f;--bg4:#22263a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b8fa8;--text3:#555873;
  --gold:#c9a84c;--gold2:#e2c070;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --active-bg:#1e3a2f;--active:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}

/* LOGIN */
#pg-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
.login-logo{margin-bottom:16px;}
.login-nome{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.login-err{background:var(--red-bg);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--red);font-size:13px;padding:10px 14px;margin-bottom:14px;text-align:left;display:none;}
.field{margin-bottom:16px;text-align:left;}
.field label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.field input:focus{border-color:var(--gold);}
.btn-entrar{width:100%;height:46px;background:var(--gold);color:#0f1117;border-radius:10px;font-size:14px;font-weight:700;margin-top:8px;transition:background .15s;}
.btn-entrar:hover{background:var(--gold2);}

/* APP */
#pg-app{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s;}
.sb-top{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-brand-name{font-size:14px;font-weight:700;color:var(--gold);}
.sb-brand-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
.sb-nav{flex:1;padding:12px 10px;}
.nav-btn{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;color:var(--text2);font-size:13.5px;font-weight:500;width:100%;text-align:left;background:none;transition:background .15s,color .15s;margin-bottom:2px;}
.nav-btn:hover{background:var(--bg4);color:var(--text);}
.nav-btn.on{background:var(--active-bg);color:var(--active);}
.nav-ico{font-size:17px;width:20px;text-align:center;}
.sb-foot{padding:14px 10px;border-top:1px solid var(--border);}
.btn-sair{display:flex;align-items:center;gap:11px;width:100%;padding:10px 13px;border-radius:10px;background:transparent;color:var(--red);font-size:13.5px;font-weight:500;transition:background .15s;}
.btn-sair:hover{background:var(--red-bg);}

/* MAIN */
.main{margin-left:240px;flex:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 30px 0;gap:12px;flex-wrap:wrap;}
.pg-title{font-size:24px;font-weight:700;}
.tb-acts{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pg-body{padding:22px 30px 60px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.stat-ico{font-size:21px;margin-bottom:10px;}
.stat-v{font-size:27px;font-weight:700;line-height:1;}
.stat-l{font-size:11px;color:var(--text2);margin-top:5px;}

/* BOTOES */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:40px;padding:0 18px;border-radius:10px;font-size:13px;font-weight:600;transition:background .15s;cursor:pointer;border:none;font-family:inherit;}
.btn-gold{background:var(--gold);color:#0f1117;}.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text);}.btn-ghost:hover{background:var(--bg4);}
.btn-g{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.22);height:32px;padding:0 12px;font-size:12px;}
.btn-r{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.22);height:32px;padding:0 12px;font-size:12px;}
.btn-a{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.22);height:32px;padding:0 12px;font-size:12px;}
.btn-sm{height:33px;padding:0 12px;font-size:12px;}
.ag{display:flex;gap:5px;}

/* TABLE */
.tw{overflow-x:auto;border-radius:16px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;font-weight:600;padding:12px 15px;text-align:left;white-space:nowrap;}
td{padding:12px 15px;font-size:13.5px;border-top:1px solid var(--border);white-space:nowrap;}
tr:hover td{background:var(--bg4);}
.tr-v td{background:rgba(239,68,68,.05);}.tr-p td{color:var(--text2);}
.badge{display:inline-flex;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.bg{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.22);}
.ba{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.22);}
.br{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.22);}
.bgr{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border);}

/* FORMS */
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--gold);}
input[type="date"]{color-scheme:dark;}
.fg select option{background:var(--bg3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.mo.open{display:flex;}
.mo-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.mo-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mo-hdr h3{font-size:16px;font-weight:700;}
.mo-x{background:none;color:var(--text2);font-size:21px;padding:2px 6px;border-radius:6px;}.mo-x:hover{background:var(--bg4);}
.mo-body{padding:22px 24px;}

/* EXTRAS */
.banner{background:#2d2200;border:1px solid var(--amber);border-radius:10px;padding:13px 18px;color:var(--amber);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.sum-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}.sum-row:last-child{border-bottom:none;}
.sum-l{font-size:12.5px;color:var(--text2);}.sum-v{font-size:17px;font-weight:700;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-t{font-size:15px;font-weight:700;}
.up-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px;}
.up-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0;}.up-bar.y{background:var(--amber);}.up-bar.r{background:var(--red);}
.up-inf{flex:1;}.up-n{font-size:13.5px;font-weight:500;}.up-d{font-size:11.5px;color:var(--text2);}
.up-v{font-size:13.5px;font-weight:700;color:var(--gold);margin-right:6px;}
.mn{display:flex;align-items:center;gap:10px;}
.mn-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;font-size:15px;}
.mn-lbl{font-size:15px;font-weight:600;min-width:150px;text-align:center;}
.loc-bar{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 18px;margin-bottom:18px;flex-wrap:wrap;}
.loc-l{font-size:13.5px;font-weight:500;color:var(--text2);flex:1;}
.loc-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--gold);font-size:14px;font-weight:700;padding:7px 12px;width:150px;text-align:right;font-family:inherit;outline:none;}
.resumo{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;margin-top:22px;}
.rr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;}.rr:last-child{border-bottom:none;}.rr.tot{font-weight:700;font-size:15.5px;}.rl{color:var(--text2);}
.empty{text-align:center;padding:56px 20px;color:var(--text2);font-size:14px;}
.sec-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px 22px;margin-top:20px;}
.sec-box-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.sec-box-body{margin-top:16px;}
.dc{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.dc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.dc-t{font-size:15px;font-weight:700;}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.dc-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;}
.dc-ico{font-size:28px;}.dc-nm{font-size:12px;font-weight:500;word-break:break-word;}.dc-acts{display:flex;gap:5px;}
.cpv-item{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:9px;}
.cpv-ico{font-size:22px;}.cpv-inf{flex:1;}.cpv-n{font-size:13.5px;font-weight:500;}.cpv-m{font-size:11.5px;color:var(--text2);}
.uz{border:2px dashed var(--border2);border-radius:10px;padding:24px;text-align:center;cursor:pointer;}.uz:hover{border-color:var(--gold);}
.uz p{color:var(--text2);font-size:13px;margin-top:6px;}
#toast{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.ti{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:13px 17px;font-size:13.5px;font-weight:500;min-width:240px;display:flex;align-items:center;gap:9px;}
.ti.ok{border-left:3px solid var(--green);}.ti.err{border-left:3px solid var(--red);}
#loader{position:fixed;inset:0;background:rgba(15,17,23,.65);display:none;align-items:center;justify-content:center;z-index:300;}
#loader.on{display:flex;}
.sp{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;}
.ham{display:none;background:transparent;color:var(--text);font-size:22px;padding:6px;}
.sbo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .ham{display:flex;}.sbo{display:block;opacity:0;pointer-events:none;transition:opacity .25s;}
  .sbo.on{opacity:1;pointer-events:all;}.sidebar{transform:translateX(-100%);}.sidebar.on{transform:translateX(0);}
  .main{margin-left:0;}.topbar{padding:16px 16px 0;}.pg-body{padding:16px 16px 40px;}
  .g4{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}.fr{grid-template-columns:1fr;}
  .dc{grid-template-columns:1fr;}.loc-inp{width:100%;}
}
@media(max-width:480px){.g4{grid-template-columns:1fr;}.stat-v{font-size:22px;}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="pg-login">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
        <rect width="80" height="80" rx="18" fill="#13243d"/>
        <path d="M22 34Q19 24 26 19Q33 14 35 22Q37 17 42 20Q37 25 37 34Z" fill="none" stroke="#4a9eda" stroke-width="2" stroke-linecap="round"/>
        <path d="M58 34Q61 24 54 19Q47 14 45 22Q43 17 38 20Q43 25 43 34Z" fill="none" stroke="#e87ca0" stroke-width="2" stroke-linecap="round"/>
        <path d="M34 34Q37 41 40 39Q43 41 46 34" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
        <path d="M23 27Q27 24 30 27" fill="none" stroke="#4a9eda" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M23 31Q26 29 29 31" fill="none" stroke="#4a9eda" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M57 27Q53 24 50 27" fill="none" stroke="#e87ca0" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M57 31Q54 29 51 31" fill="none" stroke="#e87ca0" stroke-width="1.4" stroke-linecap="round"/>

      </svg>
    </div>
    <div class="login-nome">KAMAIS Clínica</div>
    <div class="login-sub">Sistema de Gestão Financeira</div>
    <div class="login-err" id="lerr"></div>
    <div class="field"><label>E-mail</label><input type="email" id="lemail" value="kamaisclinica@gmail.com"/></div>
    <div class="field"><label>Senha</label><input type="password" id="lsenha" placeholder="••••••••"/></div>
    <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="pg-app">
  <div class="sbo" id="sbo" onclick="fechaSb()"></div>
  <aside class="sidebar" id="sb">
    <div class="sb-top">
      <svg viewBox="0 0 44 44" width="38" height="38" xmlns="http://www.w3.org/2000/svg" style="border-radius:9px;flex-shrink:0">
        <rect width="44" height="44" rx="10" fill="#13243d"/>
        <path d="M11 18Q9.5 13 13 11Q16.5 9 17.5 13Q18.5 10.5 21 11.5Q18.5 13.5 18.5 18Z" fill="none" stroke="#4a9eda" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M33 18Q34.5 13 31 11Q27.5 9 26.5 13Q25.5 10.5 23 11.5Q25.5 13.5 25.5 18Z" fill="none" stroke="#e87ca0" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17.5 18Q19.5 21.5 22 20.5Q24.5 21.5 26.5 18" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
        <text x="5" y="38" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#c9a84c">KM.</text>
      </svg>
      <div><div class="sb-brand-name">KAMAIS</div><div class="sb-brand-sub">Clínica</div></div>
    </div>
    <nav class="sb-nav">
      <button class="nav-btn" data-p="dashboard"><span class="nav-ico">🏠</span>Dashboard</button>
      <button class="nav-btn" data-p="financeiro"><span class="nav-ico">💰</span>Financeiro</button>
      <button class="nav-btn" data-p="contas"><span class="nav-ico">🗂️</span>Contas</button>
      <button class="nav-btn" data-p="comprovantes"><span class="nav-ico">📎</span>Comprovantes</button>
      <button class="nav-btn" data-p="documentos"><span class="nav-ico">📁</span>Documentos</button>
    </nav>
    <div class="sb-foot"><button class="btn-sair" onclick="fazerLogout()">🚪 Sair</button></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="ham" onclick="toggleSb()">☰</button>
        <h1 class="pg-title" id="pg-title">Dashboard</h1>
      </div>
      <div class="tb-acts" id="tb-acts"></div>
    </div>
    <div class="pg-body" id="pg-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mo" id="mo">
  <div class="mo-box">
    <div class="mo-hdr"><h3 id="mo-title"></h3><button class="mo-x" onclick="fechaModal()">✕</button></div>
    <div class="mo-body" id="mo-body"></div>
  </div>
</div>

<div id="loader"><div class="sp"></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB = supabase.createClient(
  'https://pvdkjditnogatdontnns.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2ZGtqZGl0bm9nYXRkb250bm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjM2NjAsImV4cCI6MjA5MjUzOTY2MH0.wLtEiTw5PC_DdmUpcd_uqlwq0ea2rPrNRR3VKM2Rlfg'
);
var CU = null;
var _ger = false;

// ---- UTILS ----
function L(v){ document.getElementById('loader').className = v ? 'on' : ''; }
function T(msg, tipo){
  var el = document.createElement('div');
  el.className = 'ti ' + (tipo||'ok');
  el.innerHTML = (tipo==='err'?'❌':'✅') + ' ' + msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}
function BRL(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function DT(s){ if(!s) return '—'; var p=s.substring(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
var MES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function NM(m,a){ return MES[m]+' '+a; }
function abreModal(t,h){ document.getElementById('mo-title').textContent=t; document.getElementById('mo-body').innerHTML=h; document.getElementById('mo').classList.add('open'); }
function fechaModal(){ document.getElementById('mo').classList.remove('open'); }
document.getElementById('mo').addEventListener('click', function(e){ if(e.target===this) fechaModal(); });
function confirma(msg){
  return new Promise(function(res){
    var d=document.createElement('div'); d.className='mo open';
    d.innerHTML='<div class="mo-box"><div class="mo-hdr"><h3>Confirmar</h3></div><div class="mo-body"><p style="color:var(--text2);margin-bottom:20px">'+msg+'</p><div class="fa"><button class="btn btn-ghost btn-sm" id="cn">Cancelar</button><button class="btn-r btn-sm" style="border-radius:8px;font-weight:600;font-family:inherit;cursor:pointer" id="cy">Excluir</button></div></div></div>';
    document.body.appendChild(d);
    d.querySelector('#cy').onclick=function(){ d.remove(); res(true); };
    d.querySelector('#cn').onclick=function(){ d.remove(); res(false); };
  });
}
async function getLoc(m,a){
  var r=await SB.from('receita_locacao').select('valor').eq('user_id',CU.id).eq('mes',m).eq('ano',a).maybeSingle();
  return Number(r.data&&r.data.valor||0);
}
async function saveLoc(m,a,v){
  var r=await SB.from('receita_locacao').upsert({user_id:CU.id,mes:m,ano:a,valor:Number(v)||0},{onConflict:'user_id,mes,ano'});
  if(r.error) throw r.error;
}
async function signed(bucket,path){
  var r=await SB.storage.from(bucket).createSignedUrl(path,3600);
  if(r.error) throw r.error;
  return r.data.signedUrl;
}

// ---- LOGIN ----
async function fazerLogin(){
  var email=document.getElementById('lemail').value.trim();
  var senha=document.getElementById('lsenha').value;
  var err=document.getElementById('lerr');
  err.style.display='none';
  if(!email||!senha){ err.textContent='Preencha e-mail e senha.'; err.style.display='block'; return; }
  document.querySelector('.btn-entrar').disabled=true;
  L(1);
  var r=await SB.auth.signInWithPassword({email:email,password:senha});
  L(0);
  document.querySelector('.btn-entrar').disabled=false;
  if(r.error){

async function geraRec(m,a){
  if(_ger) return; _ger=true;
  try{
    var rf=await SB.from('contas_fixas').select('*').eq('user_id',CU.id).eq('ativa',true);
    if(!rf.data||!rf.data.length) return;
    var re=await SB.from('lancamentos').select('conta_fixa_id').eq('user_id',CU.id).eq('mes',m).eq('ano',a).eq('tipo','conta_fixa');
    var ids=new Set((re.data||[]).map(function(l){return l.conta_fixa_id;}));
    var novas=rf.data.filter(function(f){return !ids.has(f.id);});
    if(!novas.length) return;
    var ins=novas.map(function(f){
      var dm=new Date(a,m,0).getDate(), dr=Math.min(f.dia_vencimento,dm);
      return{user_id:CU.id,tipo:'conta_fixa',descricao:f.nome,valor:f.valor_padrao,
        data_vencimento:a+'-'+String(m).padStart(2,'0')+'-'+String(dr).padStart(2,'0'),
        data_pagamento:null,status:'a_pagar',mes:m,ano:a,conta_fixa_id:f.id};
    });
    await SB.from('lancamentos').insert(ins);
  }finally{_ger=false;}
}

    '<div class="rr"><span class="rl">🧑‍⚕️ KAMYLLA (50%)</span><span style="font-weight:700;color:var(--gold)" id="r-k">—</span></div>'+
    '</div>';
  document.getElementById('f-ant').onclick=function(){FM--;if(FM<1){FM=12;FA--;}fLoad();};
  document.getElementById('f-prox').onclick=function(){FM++;if(FM>12){FM=1;FA++;}fLoad();};
  await fLoad();
}
async function fLoad(){
  var lbl=document.getElementById('f-lbl');if(lbl)lbl.textContent=NM(FM,FA);
  L(1);
  try{
    var r=await SB.from('lancamentos').select('*').eq('user_id',CU.id).eq('mes',FM).eq('ano',FA).order('data_vencimento',{ascending:true,nullsFirst:false});
    FL=r.data||[]; FLoc=await getLoc(FM,FA);
    fCards();fTabela();fResumo();
  }catch(e){T('Erro: '+e.message,'err');}finally{L(0);}
}
function fCards(){
  var b=FL.reduce(function(s,l){return s+Number(l.valor);},0);
  var p=FL.filter(function(l){return l.status==='pago';}).reduce(function(s,l){return s+Number(l.valor);},0);
  var a=FL.filter(function(l){return l.status==='a_pagar';}).reduce(function(s,l){return s+Number(l.valor);},0);
  function ss(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
  ss('fc-b',BRL(b));ss('fc-p',BRL(p));ss('fc-a',BRL(a));ss('fc-l',BRL(FLoc));
}
function fTabela(){
  var tb=document.getElementById('f-tb'),em=document.getElementById('f-em'),tw=document.querySelector('.tw');
  if(!tb)return; var hj=new Date().toISOString().substring(0,10);
  if(!FL.length){tw.style.display='none';em.style.display='block';return;}
  tw.style.display='';em.style.display='none';
  tb.innerHTML=FL.map(function(l){
    var v=l.status==='a_pagar'&&l.data_vencimento&&l.data_vencimento<hj;
    var p=l.status==='pago';
    var rc=v?'tr-v':p?'tr-p':'', bc=p?'bg':v?'br':'ba', bt=p?'✅ Pago':v?'🔴 Vencida':'⏳ A pagar';
    return '<tr class="'+rc+'"><td>'+DT(l.data_pagamento)+'</td><td>'+DT(l.data_vencimento)+'</td>'+
      '<td>'+l.descricao+'</td><td style="font-weight:700;color:var(--gold)">'+BRL(l.valor)+'</td>'+
      '<td><span class="badge '+bc+'">'+bt+'</span></td>'+
      '<td>'+(p?'':'<button class="btn-g" style="border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;height:32px;padding:0 12px;font-size:12px" onclick="fPago(\''+l.id+'\')">✅ Pago</button>')+'</td></tr>';
  }).join('');
}
function fResumo(){
  var b=FL.reduce(function(s,l){return s+Number(l.valor);},0);
  var liq=b-FLoc, lC=Math.round(liq*100), mC=Math.floor(lC/2), kC=lC-mC;
  function ss(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
  ss('r-b',BRL(b));ss('r-l',BRL(FLoc));ss('r-liq',BRL(liq));ss('r-m',BRL(mC/100));ss('r-k',BRL(kC/100));
}
async function fPago(id){
  L(1);await SB.from('lancamentos').update({status:'pago',data_pagamento:new Date().toISOString().substring(0,10)}).eq('id',id).eq('user_id',CU.id);L(0);
  T('Marcado como pago!');fLoad();
}

// ============ COMPROVANTES ============
var CM=new Date().getMonth()+1, CA=new Date().getFullYear();
async function pgCpv(){
  document.getElementById('tb-acts').innerHTML=
    '<div class="mn"><button class="mn-btn" id="c-ant">◀</button><span class="mn-lbl" id="c-lbl"></span><button class="mn-btn" id="c-prox">▶</button></div>'+
    '<button class="btn btn-gold btn-sm" onclick="modalCpv()">+ Anexar</button>';
  document.getElementById('pg-body').innerHTML=
    '<p style="color:var(--text2);font-size:13px;margin-bottom:18px">Links privados — expiram em 60 min.</p>'+
    '<div id="cv-list"></div><div id="cv-em" style="display:none" class="empty">Nenhum comprovante para este mês.</div>';
  document.getElementById('c-ant').onclick=function(){CM--;if(CM<1){CM=12;CA--;}cLoad();};
  document.getElementById('c-prox').onclick=function(){CM++;if(CM>12){CM=1;CA++;}cLoad();};
  await cLoad();
}
async function cLoad(){
  var lbl=document.getElementById('c-lbl');if(lbl)lbl.textContent=NM(CM,CA);
  L(1);
  try{
    var lm=await SB.from('lancamentos').select('id').eq('user_id',CU.id).eq('mes',CM).eq('ano',CA);
    var ids=(lm.data||[]).map(function(l){return l.id;});
    var cvs=[];
    if(ids.length){var rc=await SB.from('comprovantes').select('*,lancamentos(descricao)').in('lancamento_id',ids).order('created_at',{ascending:false});cvs=rc.data||[];}
    var list=document.getElementById('cv-list'),em=document.getElementById('cv-em');
    if(!cvs.length){if(list)list.innerHTML='';if(em)em.style.display='block';return;}
    if(em)em.style.display='none';
    if(list)list.innerHTML=cvs.map(function(c){
      var ico=c.arquivo_nome.split('.').pop().toUpperCase()==='PDF'?'📑':'🖼️';
      var dt=new Date(c.created_at).toLocaleDateString('pt-BR');
      return '<div class="cpv-item"><div class="cpv-ico">'+ico+'</div><div class="cpv-inf"><div class="cpv-n">'+c.arquivo_nome+'</div><div class="cpv-m">'+((c.lancamentos&&c.lancamentos.descricao)||'—')+' · '+dt+'</div></div>'+
        '<div class="ag"><button class="btn-g" style="border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;height:32px;padding:0 12px;font-size:12px" onclick="cVer(\''+c.arquivo_path+'\')">👁 Ver</button>'+
        '<button class="btn-r" style="border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;height:32px;padding:0 12px;font-size:12px" onclick="cDel(\''+c.id+'\',\''+c.arquivo_path+'\')">🗑️</button></div></div>';
    }).join('');
  }catch(e){T('Erro: '+e.message,'err');}finally{L(0);}
}
function modalCpv(){
  abreModal('Anexar comprovante',
    '<div class="fg"><label>Lançamento</label><select id="cs"><option value="">Carregando…</option></select></div>'+
    '<div class="fg"><label>Arquivo</label><div class="uz" onclick="document.getElementById(\'cf\').click()"><div style="font-size:28px">📄</div><p>Clique aqui · PDF, JPG, PNG · máx. 10 MB</p></div>'+
    '<input type="file" id="cf" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="document.getElementById(\'cfn\').textContent=this.files[0]?\'📄 \'+this.files[0].name:\'\'"/>'+
    '<div id="cfn" style="font-size:12px;color:var(--text2);margin-top:6px"></div></div>'+
    '<div class="fa"><button class="btn btn-ghost btn-sm" onclick="fechaModal()">Cancelar</button><button class="btn btn-gold btn-sm" onclick="cpvUp()">Enviar</button></div>');
  SB.from('lancamentos').select('id,descricao,data_vencimento').eq('user_id',CU.id).eq('mes',CM).eq('ano',CA).order('data_vencimento').then(function(r){
    var sel=document.getElementById('cs');if(!sel)return;
    sel.innerHTML='<option value="">Selecione…</option>';
    (r.data||[]).forEach(function(l){var o=document.createElement('option');o.value=l.id;o.textContent=l.descricao+(l.data_vencimento?' — '+DT(l.data_vencimento):'');sel.appendChild(o);});
  });
}
async function cpvUp(){
  var lancId=document.getElementById('cs').value;
  var file=document.getElementById('cf').files[0];
  if(!lancId){T('Selecione um lançamento.','err');return;}
  if(!file){T('Selecione um arquivo.','err');return;}
  if(file.size>10*1024*1024){T('Arquivo muito grande.','err');return;}
  L(1);fechaModal();
  try{
    var path=CU.id+'/'+lancId+'/'+Date.now()+'_'+file.name;
    var ru=await SB.storage.from('comprovantes').upload(path,file);if(ru.error)throw ru.error;
    var rd=await SB.from('comprovantes').insert({user_id:CU.id,lancamento_id:lancId,arquivo_path:path,arquivo_nome:file.name});if(rd.error)throw rd.error;
    T('Enviado!');cLoad();
  }catch(e){T('Erro: '+e.message,'err');}finally{L(0);}
}
async function cVer(path){L(1);try{var u=await signed('comprovantes',path);L(0);window.open(u,'_blank');}catch(e){L(0);T('Erro: '+e.message,'err');}}
async function cDel(id,path){
  if(!await confirma('Excluir este comprovante?'))return;
  L(1);await SB.storage.from('comprovantes').remove([path]);await SB.from('comprovantes').delete().eq('id',id);L(0);T('Excluído.');cLoad();
}

// ============ DOCUMENTOS ============
async function pgDocs(){
  document.getElementById('tb-acts').innerHTML='';
  document.getElementById('pg-body').innerHTML=
    '<p style="color:var(--text2);font-size:13px;margin-bottom:20px">Links privados — expiram em 60 min.</p>'+
    '<div class="dc">'+
    '<div><div class="dc-hdr"><span class="dc-t">🧑‍⚕️ Kamylla</span><button class="btn btn-gold btn-sm" onclick="modalDoc(\'kamylla\')">+ Anexar documentos</button></div><div id="dk" class="dg"></div><div id="dke" style="display:none;text-align:center;padding:30px 0;color:var(--text2);font-size:13px">📁 Nenhum documento.</div></div>'+
    '<div><div class="dc-hdr"><span class="dc-t">🧑‍⚕️ Maisa</span><button class="btn btn-gold btn-sm" onclick="modalDoc(\'maisa\')">+ Anexar documentos</button></div><div id="dm" class="dg"></div><div id="dme" style="display:none;text-align:center;padding:30px 0;color:var(--text2);font-size:13px">📁 Nenhum documento.</div></div>'+
    '</div>';
  dLoad('kamylla');dLoad('maisa');
}
async function dLoad(s){
  var g=document.getElementById(s==='kamylla'?'dk':'dm'), e=document.getElementById(s==='kamylla'?'dke':'dme');
  var r=await SB.from('documentos').select('*').eq('user_id',CU.id).eq('socia',s).order('created_at',{ascending:false});
  var docs=r.data||[];
  if(!docs.length){if(g)g.innerHTML='';if(e)e.style.display='block';return;}
  if(e)e.style.display='none';
  if(g)g.innerHTML=docs.map(function(d){
    var ico=d.arquivo_path.split('.').pop().toUpperCase()==='PDF'?'📑':'🖼️';
    var dt=new Date(d.created_at).toLocaleDateString('pt-BR');
    return '<div class="dc-card"><div class="dc-ico">'+ico+'</div><div class="dc-nm">'+d.nome+'</div><div style="font-size:10px;color:var(--text2)">'+dt+'</div>'+
      '<div class="dc-acts"><button class="btn-g" style="border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;height:30px;padding:0 10px;font-size:12px" onclick="dVer(\''+d.arquivo_path+'\')">👁</button>'+
      '<button class="btn-r" style="border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;height:30px;padding:0 10px;font-size:12px" onclick="dDel(\''+d.id+'\',\''+d.arquivo_path+'\',\''+s+'\')">🗑️</button></div></div>';
  }).join('');
}
function modalDoc(s){
  abreModal('Enviar — '+(s==='kamylla'?'Kamylla':'Maisa'),
    '<div class="fg"><label>Nome do documento *</label><input id="dn" placeholder="Ex: CRM, Diploma, Contrato…"/></div>'+
    '<div class="fg"><label>Arquivo</label><div class="uz" onclick="document.getElementById(\'df\').click()"><div style="font-size:28px">📁</div><p>Clique aqui · PDF, JPG, PNG · máx. 20 MB</p></div>'+
    '<input type="file" id="df" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="document.getElementById(\'dfn\').textContent=this.files[0]?\'📄 \'+this.files[0].name:\'\'"/>'+
    '<div id="dfn" style="font-size:12px;color:var(--text2);margin-top:6px"></div></div>'+
    '<div class="fa"><button class="btn btn-ghost btn-sm" onclick="fechaModal()">Cancelar</button><button class="btn btn-gold btn-sm" onclick="docUp(\''+s+'\')">Enviar</button></div>');
}
async function docUp(s){
  var n=document.getElementById('dn').value.trim();
  var f=document.getElementById('df').files[0];
  if(!n){T('Informe o nome.','err');return;}if(!f){T('Selecione um arquivo.','err');return;}
  if(f.size>20*1024*1024){T('Arquivo muito grande.','err');return;}
  L(1);fechaModal();
  try{
    var path=CU.id+'/'+s+'/'+Date.now()+'_'+f.name;
    var ru=await SB.storage.from('documentos').upload(path,f);if(ru.error)throw ru.error;
    var rd=await SB.from('documentos').insert({user_id:CU.id,socia:s,nome:n,arquivo_path:path});if(rd.error)throw rd.error;
    T('Enviado!');dLoad(s);
  }catch(e){T('Erro: '+e.message,'err');}finally{L(0);}
}
async function dVer(path){L(1);try{var u=await signed('documentos',path);L(0);window.open(u,'_blank');}catch(e){L(0);T('Erro: '+e.message,'err');}}
async function dDel(id,path,s){
  if(!await confirma('Excluir este documento?'))return;
  L(1);await SB.storage.from('documentos').remove([path]);await SB.from('documentos').delete().eq('id',id);L(0);T('Excluído.');dLoad(s);
}
</script>
